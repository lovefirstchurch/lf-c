<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poimen - Church Administration Portal</title>
  <link rel="icon" href="/shared/images/icon-192.png">
  <link rel="stylesheet" href="/shared/index.css">
  <style>
    /* Custom styling for Poimen administration console */
    .poimen-header {
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .poimen-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .poimen-logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
    }
    .poimen-logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .poimen-logo-text {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 700;
      background: linear-gradient(to right, #a855f7, #3acff8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    /* Adjust Stack container to slide below fixed header */
    .Stack {
      height: calc(100dvh - 70px);
      margin-top: 70px;
    }
    .Stack-viewContent {
      padding: 2rem 1.5rem 6rem;
    }

    /* Drilldown Nav Card list styles */
    .drilldown-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .drilldown-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      text-decoration: none;
      color: inherit;
    }
    .drilldown-title {
      font-weight: 600;
      font-size: 0.95rem;
    }
    .drilldown-subtitle {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      margin-top: 0.15rem;
    }
    
    /* View headers */
    .view-header {
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
    }
    .back {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .back:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(var(--primary-rgb), 0.5);
    }
    .view-title {
      font-size: 1.5rem;
    }
    
    /* Layout widgets */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    .metric-card {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 120px;
    }
    .metric-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
      margin-top: 0.5rem;
    }

    /* Named Ticks list */
    .attendance-tick-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .attendance-tick-item:last-child {
      border-bottom: none;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255,255,255,0.1);
      transition: .4s;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #a855f7;
    }
    input:checked + .slider:before {
      transform: translateX(26px);
    }
  </style>
</head>
<body>

  <!-- Sidebar Navigation Drawer Backdrop -->
  <div class="Sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- Sidebar Navigation Drawer Panel -->
  <aside class="Sidebar-panel" id="sidebarPanel">
    <div class="Sidebar-header">
      <div class="Sidebar-logo">
        <img src="/shared/images/love-first-logo.png" alt="Love First Church">
        <div class="Sidebar-logo-text" style="background: linear-gradient(to right, #a855f7, #3acff8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Poimen</div>
      </div>
      <button class="Sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close Sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    
    <nav class="Sidebar-nav" id="sidebarNav">
      <div class="Sidebar-nav-heading">Navigation</div>
      <a href="/" class="Sidebar-nav-link active" data-path="/">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        Hierarchy Explorer
      </a>
      <a href="/directory" class="Sidebar-nav-link" data-path="/directory">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        Membership Directory
      </a>
      <a href="/arrivals-admin" class="Sidebar-nav-link" data-path="/arrivals-admin">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2" ry="2"></rect><line x1="16" y1="8" x2="20" y2="8"></line><line x1="16" y1="12" x2="20" y2="12"></line><line x1="16" y1="16" x2="20" y2="16"></line></svg>
        Arrivals Admin Console
      </a>
      <a href="/shepherding" class="Sidebar-nav-link" data-path="/shepherding">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        Shepherding Accountability
      </a>
      <a href="/history" class="Sidebar-nav-link" data-path="/history">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        Universal History Log
      </a>
    </nav>
    
    <div class="Sidebar-footer">
      <div class="Sidebar-profile">
        <div class="Sidebar-avatar" id="sidebarAvatar">U</div>
        <div class="Sidebar-profile-info">
          <div class="Sidebar-profile-name" id="sidebarProfileName">User Name</div>
          <div class="Sidebar-profile-role" id="sidebarProfileRole">USER ROLE</div>
        </div>
      </div>
      <button class="btn btn-secondary btn-sm" id="sidebarSignOutBtn" style="padding:0.4rem; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center;" title="Sign Out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button>
    </div>
  </aside>

  <!-- Fixed Top Header -->
  <div class="poimen-header">
    <div class="poimen-logo">
      <button class="menu-toggle-btn" id="menuToggleBtn" style="margin-right: 0.75rem;" aria-label="Toggle Navigation Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div class="poimen-logo-icon"><img src="/shared/images/love-first-logo.png" alt="Love First Church"></div>
      <div class="poimen-logo-text">Poimen</div>
    </div>
    <div style="display: flex; align-items: center; gap: 1rem;">
      <span id="headerUserLabel" style="font-size: 0.85rem; color: var(--muted-foreground); display: none;">Loading...</span>
      <a href="/synago" class="btn btn-secondary btn-sm">Switch to Synago (App 1)</a>
    </div>
  </div>

  <!-- Horizontal CSS Scroll-Snap Stack Container (SPA Viewport) -->
  <div class="Stack">
    <!-- Views are dynamically generated and appended/prepended here by app.js -->
  </div>

  <!-- Shared Developer Context scripts -->
  <script src="/shared/components.js"></script>
  <script src="/poimen/app.js"></script>
</body>
</html>
